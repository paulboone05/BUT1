    <div id="header">
        <div class="menu-deroulant">
            <img src="img/menu_deroulant.png" alt="menu déroulant" id="menu">
            <div class="menu">
                <a href="emprunter_vehicule.html">Emprunter un véhicule</a>
                <a href="louer_vehicule.html">Louer mon véhicule</a>
                <a href="proposer_covoiturage.html">Proposer un covoiturage</a>

        </div>

  <div id="page">
        <div id="formulaire">
            <h1>Proposer un covoiturage</h1>
            <input type="text" placeholder="Nom et prénom">
            <input type="text" placeholder="Destination (ex : Lille → Paris)">
            <select>
                <option value="">Type de véhicule</option>
                <option>Citadine</option>
                <option>Berline</option>
                <option>SUV</option>
                <option>Utilitaire</option>
                <option>Minibus</option>
            </select>
            <label class="image-box" for="image">
                Cliquer pour ajouter une image
            </label>
            <input type="file" id="image" accept="image/*" hidden>
            <input type="datetime-local">
            <input type="text" placeholder="Lieu de rendez-vous">
            <a href="annonce_publiée.html">
                <button id="bouton">Publier l’annonce</button>
            </a>
        </div>
